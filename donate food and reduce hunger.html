<!--CO-1 Internet Fundamentals, HTML Structure, Basic CSS-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donate Food And Reduce Hunger</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background-color:#f4f9f4;
}

header{
background-color:#2e7d32;
color:white;
padding:20px;
text-align:center;
}

section{
padding:20px;
}

h2{
color:#2e7d32;
}

.card{
background:white;
padding:15px;
margin:15px auto;
max-width:500px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

label{
display:block;
margin-top:10px;
}

input, textarea{
width:100%;
padding:8px;
margin-top:5px;
}

button{
margin-top:15px;
padding:10px;
width:100%;
background-color:#2e7d32;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

button:hover{
background-color:#1b5e20;
}

footer{
text-align:center;
padding:10px;
background-color:#e8f5e9;
margin-top:20px;
}

#donationPage{
display:none;
}

</style>
</head>

<body>

<header>
<h1>Donate Food And Reduce Hunger</h1>
<p>Share Food • Save Lives</p>
</header>


<!-- LOGIN PAGE -->

<section id="loginPage">

<h2>Login</h2>

<div class="card">

    <!--CO-2 HTML Forms, Semantic Tags, CSS Layout-->
    
<form onsubmit="login(event)">

<label>Name</label>
<input type="text" id="loginName" required placeholder="Enter your name">

<label>Phone Number</label>
<input type="tel" id="loginPhone"
required
pattern="[0-9]{10}"
placeholder="10-digit mobile number">

<button type="submit">Login</button>

</form>

</div>

</section>



<!-- DONATION PAGE -->

<section id="donationPage">

<h2>Donate Food</h2>

<div class="card">

<form onsubmit="saveDonation(event)">

<label>Food Item Name</label>
<input type="text" id="food" required>

<label>Quantity</label>
<input type="text" id="quantity" required>

<label>Pickup Location</label>
<input type="text" id="location" required>

<label>Best Before</label>
<input type="date" id="date" required>

<label>Additional Details</label>
<textarea id="details"></textarea>

<button type="submit">Submit Donation</button>

<button type="button" onclick="viewDonations()">View Donations</button>

</form>

</div>


<h2>Submitted Donations</h2>

<div class="card" id="output">
<p>No donations yet.</p>
</div>

</section>


<footer>
<p>© 2026 Donate Food And Reduce Hunger | Share Food, Spread Care ❤️</p>
</footer>

<!--CO3 – JavaScript Programming Concepts-->

<script>

let donorName="";
let donorPhone="";


function login(event)
{
event.preventDefault();

donorName=document.getElementById("loginName").value;
donorPhone=document.getElementById("loginPhone").value;

/*CO-4 JavaScript Interactivity & DOM Manipulation*/

document.getElementById("loginPage").style.display="none";
document.getElementById("donationPage").style.display="block";
}



function saveDonation(event)
{
event.preventDefault();

const food=document.getElementById("food").value;
const quantity=document.getElementById("quantity").value;
const location=document.getElementById("location").value;
const date=document.getElementById("date").value;
const details=document.getElementById("details").value;

//CO5 – Advanced Web Application

let donations=JSON.parse(localStorage.getItem("donations")) || [];


const donation={
name:donorName,
phone:donorPhone,
food:food,
quantity:quantity,
location:location,
date:date,
details:details
};


donations.push(donation);


localStorage.setItem("donations",JSON.stringify(donations));


alert("Donation Saved Successfully!");

document.querySelector("#donationPage form").reset();

}



function viewDonations()
{

let donations=JSON.parse(localStorage.getItem("donations")) || [];

const output=document.getElementById("output");

if(donations.length===0)
{
output.innerHTML="<p>No donations available.</p>";
return;
}

let html="";

donations.forEach(function(donation)
{

html+=`

<p><strong>Donor Name:</strong> ${donation.name}</p>

<p><strong>Phone:</strong> ${donation.phone}</p>

<p><strong>Food Item:</strong> ${donation.food}</p>

<p><strong>Quantity:</strong> ${donation.quantity}</p>

<p><strong>Location:</strong> ${donation.location}</p>

<p><strong>Best Before:</strong> ${donation.date}</p>

<p><strong>Details:</strong> ${donation.details}</p>

<hr>

`;

});

output.innerHTML=html;

}

</script>

</body>
</html>
